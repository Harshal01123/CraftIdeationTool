<body class="bg-surface text-on-surface font-body min-h-screen relative overflow-x-hidden">
<!-- Background Layer -->
<div class="fixed inset-0 heritage-pattern z-0" data-alt="Intricate terracotta Indian block print textile pattern"></div>
<div class="fixed inset-0 paper-grain z-10"></div>
<!-- Main Navigation (Suppressed version for focused task) -->
<header class="relative z-20 w-full px-8 py-10 flex justify-center">
<h1 class="text-3xl font-headline font-semibold text-[#EDE5D0] tracking-widest flex items-center gap-3">
<span class="font-hindi text-4xl">कला</span>kriti
        </h1>
</header>
<main class="relative z-20 flex items-center justify-center px-6 pb-20">
<!-- Login Card -->
<div class="w-full max-w-md bg-[#EDE5D0] rounded-xl custom-shadow p-10 relative overflow-hidden">
<!-- Decorative Border Motifs -->
<div class="absolute top-0 left-0 w-full h-1 bg-[repeating-linear-gradient(90deg,#C9962A,#C9962A_10px,transparent_10px,transparent_20px)] opacity-40"></div>
<div class="absolute bottom-0 left-0 w-full h-1 bg-[repeating-linear-gradient(90deg,#C9962A,#C9962A_10px,transparent_10px,transparent_20px)] opacity-40"></div>
<div class="text-center mb-10">
<h2 class="text-4xl font-headline font-light tracking-widest text-primary mb-2">LOGIN</h2>
<div class="flex justify-center items-center gap-2">
<span class="h-[1px] w-8 bg-secondary opacity-30"></span>
<span class="text-secondary font-hindi text-lg">स्वागतम्</span>
<span class="h-[1px] w-8 bg-secondary opacity-30"></span>
</div>
</div>
<form class="space-y-8">
<!-- Email Field -->
<div class="group">
<label class="block text-[11px] font-label font-medium tracking-[0.2em] text-outline mb-1 uppercase" for="email">
                        Email Address
                    </label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-secondary transition-colors placeholder:text-outline/30 font-body text-on-surface" id="email" placeholder="curator@kalakriti.in" type="email"/>
<div class="absolute -top-4 right-0 font-hindi text-secondary text-sm opacity-0 group-focus-within:opacity-100 transition-opacity">
                            ईमेल
                        </div>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block text-[11px] font-label font-medium tracking-[0.2em] text-outline mb-1 uppercase" for="password">
                        Password
                    </label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-secondary transition-colors placeholder:text-outline/30 font-body text-on-surface" id="password" placeholder="••••••••" type="password"/>
<div class="absolute -top-4 right-0 font-hindi text-secondary text-sm opacity-0 group-focus-within:opacity-100 transition-opacity">
                            कूटशब्द
                        </div>
</div>
</div>
<div class="flex items-center justify-between text-xs font-label font-medium tracking-wider text-outline">
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span>REMEMBER ME</span>
</label>
<a class="hover:text-secondary transition-colors" href="#">FORGOT PASSWORD?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-[#ffdea7] font-label font-semibold tracking-[0.2em] py-4 rounded-lg shadow-lg hover:shadow-xl hover:bg-[#944925] transition-all transform active:scale-[0.98] uppercase" type="submit">
                    LOGIN
                </button>
</form>
<div class="mt-12 text-center">
<p class="text-sm font-body italic text-on-surface/70 mb-4">New here? <a class="text-secondary font-label not-italic font-bold tracking-widest ml-1 hover:underline decoration-secondary underline-offset-4" href="#">SIGNUP!</a></p>
<div class="flex items-center justify-center gap-4 opacity-40">
<span class="material-symbols-outlined text-sm">filter_vintage</span>
<span class="material-symbols-outlined text-sm">filter_vintage</span>
<span class="material-symbols-outlined text-sm">filter_vintage</span>
</div>
</div>
</div>
